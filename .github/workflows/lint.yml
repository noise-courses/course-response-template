name: lint

on:
  push:
  pull_request:

# Verifies that any week-NN.md files have a Questions section. Courses
# that require additional sections (Summary, Reflection, etc.) should
# add more checks below.

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify response files have required sections
        run: |
          missing=0
          shopt -s nullglob
          for f in week-*.md; do
            if ! grep -q -i "^\*\*Questions\*\*" "$f"; then
              echo "::error file=$f::missing **Questions** section"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "One or more response files are missing the Questions section."
            exit 1
          fi
          echo "All response files pass structure check."

      - name: Warn on stray files
        run: |
          for f in *.md; do
            case "$f" in
              README.md|week-*.md) ;;
              *) echo "::warning file=$f::unexpected markdown file (expected week-NN.md)" ;;
            esac
          done
